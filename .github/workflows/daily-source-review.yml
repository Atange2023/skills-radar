name: Review Skills Sources

on:
  schedule:
    - cron: "5 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Review GitHub sources
        run: npm run review:sources
      - name: Commit source changes
        run: |
          if git diff --quiet -- content/source-status.json; then
            echo "No source changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/source-status.json
          git commit -m "Refresh source review status"
          git push
